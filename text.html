<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Business Center Menu</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
}

header{
    background:#2e86de;
    color:white;
    padding:15px;
    text-align:center;
}

table{
    border-collapse:collapse;
    margin:30px auto;
    width:80%;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:12px;
    text-align:center;
}

th{
    background:#2e86de;
    color:white;
}

tr:nth-child(even){
    background:#f9f9f9;
}

button{
    background:#25D366;
    border:none;
    color:white;
    padding:8px 12px;
    cursor:pointer;
    border-radius:5px;
}
</style>

<script>
function pesan(nama){
    let nomor = "6283877337584";
    let pesan = "Halo, saya ingin memesan " + nama + " dari Business Center";
    let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
    window.open(url,"_blank");
}
</script>

</head>

<body>

<header>
<h1>Business Center</h1>
<p>Daftar Menu</p>
</header>

<table>

<tr>
<th>Produk</th>
<th>Kategori</th>
<th>Harga</th>
<th>Pesan</th>
</tr>

<tr>
<td>Es Teh Manis</td>
<td>Minuman</td>
<td>Rp 3.000</td>
<td><button onclick="pesan('Es Teh Manis')">Pesan</button></td>
</tr>

<tr>
<td>Mie Instan</td>
<td>Makanan</td>
<td>Rp 8.000</td>
<td><button onclick="pesan('Mie Instan')">Pesan</button></td>
</tr>

<tr>
<td>Roti Bakar</td>
<td>Snack</td>
<td>Rp 10.000</td>
<td><button onclick="pesan('Roti Bakar')">Pesan</button></td>
</tr>

<tr>
<td>Kopi Susu</td>
<td>Minuman</td>
<td>Rp 7.000</td>
<td><button onclick="pesan('Kopi Susu')">Pesan</button></td>
</tr>

<tr>
<td>Nasi Goreng</td>
<td>Makanan</td>
<td>Rp 15.000</td>
<td><button onclick="pesan('Nasi Goreng')">Pesan</button></td>
</tr>

</table>

</body>
</html>
